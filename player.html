<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiche Joueur · FMinito FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #a8c000;
      --green2: #c8e800;
      --dark:   #0a0c06;
      --card:   #181d0e;
      --card2:  #1e2410;
      --border: #2a3010;
      --text:   #e8edcc;
      --muted:  #7a8555;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(180deg, transparent 0px, transparent 58px, rgba(168,192,0,.04) 58px, rgba(168,192,0,.04) 60px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 118px, rgba(168,192,0,.03) 118px, rgba(168,192,0,.03) 120px);
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 16px;
      padding: 20px 40px; border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px; color: var(--muted);
      text-decoration: none; font-family: 'Barlow Condensed', sans-serif;
      font-size: .95rem; letter-spacing: .08em; text-transform: uppercase; transition: color .2s;
    }
    .back-btn:hover { color: var(--green); }
    .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .1em; color: var(--green); margin-left: auto; }

    /* MAIN */
    main { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

    /* HERO */
    .player-hero {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 40px;
      padding-bottom: 36px;
      border-bottom: 1px solid var(--border);
    }

    .hero-badge {
      position: relative;
      width: 110px; height: 130px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; flex-shrink: 0;
      overflow: hidden;
    }
    .hero-badge::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green2));
    }
    .badge-position {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: .05em; color: var(--green);
      line-height: 1;
    }
    .badge-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem; font-weight: 600; letter-spacing: .15em;
      color: var(--muted); text-transform: uppercase;
    }

    .hero-info { flex: 1; }
    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      letter-spacing: .04em; line-height: .95;
      color: var(--text);
    }
    .hero-name span { color: var(--green); }
    .hero-tags {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;
    }
    .tag {
      font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; padding: 5px 12px; border-radius: 3px;
    }
    .tag-nat { background: rgba(168,192,0,.08); color: var(--green); border: 1px solid rgba(168,192,0,.2); }
    .tag-club { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }

    /* GRID SECTIONS */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .profile-grid { grid-template-columns: 1fr; } .player-hero { flex-direction: column; align-items: flex-start; } }

    .profile-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .profile-block.full { grid-column: 1 / -1; }

    .block-title {
      font-family: 'Bebas Neue', sans-serif; font-size: .95rem; letter-spacing: .2em;
      color: var(--green); text-transform: uppercase; padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
    }
    .block-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid rgba(42,48,16,.6);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-key { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 600; color: var(--text); }

    /* FOOT PILL */
    .foot-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; font-weight: 700;
      letter-spacing: .06em;
      background: rgba(168,192,0,.1); color: var(--green); border: 1px solid rgba(168,192,0,.2);
    }

    /* STATS WHEEL BUTTON */
    .wheel-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .wheel-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(168,192,0,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .wheel-preview {
      width: 160px; height: 160px;
      margin: 0 auto 24px;
      position: relative;
    }

    /* Static blurred radar placeholder */
    .wheel-preview svg { filter: blur(3px) opacity(.35); }

    .lock-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .lock-icon {
      width: 44px; height: 44px;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }

    .wheel-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
      letter-spacing: .08em; color: var(--text); margin-bottom: 6px;
    }
    .wheel-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem;
      letter-spacing: .08em; color: var(--muted); text-transform: uppercase;
      margin-bottom: 24px;
    }

    .btn-wheel {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--card2); color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 14px 28px; cursor: not-allowed;
      position: relative; overflow: hidden;
      transition: all .2s;
    }
    .btn-wheel .lock { font-size: 1rem; }
    .btn-wheel:hover { border-color: rgba(168,192,0,.2); color: rgba(168,192,0,.4); }

    .coming-soon {
      display: inline-block;
      margin-top: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); opacity: .5;
    }

    /* WHEEL CTA */
    .wheel-cta-block {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 24px 28px; text-decoration: none; cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative; overflow: hidden;
    }
    .wheel-cta-block::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green2));
    }
    .wheel-cta-block:hover {
      border-color: var(--green);
      box-shadow: 0 8px 30px rgba(168,192,0,.15);
      transform: translateY(-2px);
    }
    .wheel-cta-left { display: flex; align-items: center; gap: 18px; }
    .wheel-cta-icon { font-size: 2.2rem; }
    .wheel-cta-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .06em; color: var(--text); line-height: 1; }
    .wheel-cta-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .wheel-cta-arrow { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--green); opacity: .5; transition: opacity .2s, transform .2s; }
    .wheel-cta-block:hover .wheel-cta-arrow { opacity: 1; transform: translateX(4px); }

    /* ADMIN MODAL */
    #admin-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); }
    .modal-box { position: relative; z-index: 1; background: #1a2008; border: 1px solid var(--border); border-radius: 12px; width: min(500px, 95vw); max-height: 85vh; overflow-y: auto; padding: 28px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .08em; color: var(--green); }
    .modal-close { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: .9rem; transition: all .2s; }
    .modal-close:hover { border-color: #c0392b; color: #c0392b; }
    .modal-subtitle { font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .modal-grid { display: flex; flex-direction: column; gap: 14px; }
    .modal-field label { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
    .attr-input-row { display: flex; align-items: center; gap: 12px; }
    .attr-input-row input[type="range"] { flex: 1; accent-color: var(--green); cursor: pointer; }
    .attr-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--green2); min-width: 24px; text-align: center; }
    .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; }
    .modal-save { background: var(--green); color: var(--dark); border: none; border-radius: 5px; padding: 12px 28px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .2s; }
    .modal-save:hover { background: var(--green2); }

    /* BOTTOM GRID */
    .bottom-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
    }
    @media (max-width: 600px) { .bottom-grid { grid-template-columns: 1fr; } }
    .bottom-block { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .bottom-block-header { display: flex; align-items: center; gap: 14px; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .bottom-icon { font-size: 1.6rem; flex-shrink: 0; opacity: .5; }
    .bottom-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: .08em; color: var(--text); }
    .bottom-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .bottom-lock { margin-left: auto; font-size: 1rem; opacity: .4; flex-shrink: 0; }
    .bottom-preview { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .preview-line { height: 8px; border-radius: 4px; background: rgba(168,192,0,.06); filter: blur(1px); }
    .preview-line.short { width: 65%; }
    .preview-line.shorter { width: 40%; }
    .perf-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(42,48,16,.5); }
    .perf-row:last-child { border-bottom: none; }
    .perf-label { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .perf-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .perf-blur { filter: blur(4px); user-select: none; opacity: .3; }
    .bottom-cta { padding: 16px 20px; border-top: 1px solid var(--border); }
    .btn-bottom { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .1em; text-transform: uppercase; cursor: not-allowed; transition: all .2s; }
    .btn-bottom:hover { border-color: rgba(168,192,0,.2); color: rgba(168,192,0,.4); }

    /* RATINGS */
    .ratings-block {
      display: flex; align-items: center; gap: 16px;
      margin-left: auto; flex-shrink: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 24px;
    }
    .rating-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .rating-label {
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem;
      letter-spacing: .15em; text-transform: uppercase; color: var(--muted);
    }
    .rating-value {
      font-family: 'Bebas Neue', sans-serif; font-size: 3rem; line-height: 1;
      letter-spacing: .02em;
    }
    .rating-value.overall  { color: var(--green2); filter: drop-shadow(0 0 10px rgba(200,232,0,.4)); }
    .rating-value.potential { color: #60aaff; filter: drop-shadow(0 0 10px rgba(96,170,255,.3)); }
    .rating-sep {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
      color: var(--muted); opacity: .4; margin-top: 16px;
    }
    @media (max-width: 600px) {
      .ratings-block { margin-left: 0; width: 100%; justify-content: center; }
      .player-hero { flex-wrap: wrap; }
    }

    /* EDIT LINK */
    .edit-bar {
      display: flex; justify-content: flex-end; margin-bottom: 20px; gap: 8px;
    }
    .btn-edit {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem;
      letter-spacing: .08em; text-transform: uppercase;
      border: 1px solid var(--border); border-radius: 5px;
      padding: 9px 18px; transition: all .2s; background: var(--card);
    }
    .btn-edit:hover { border-color: var(--green); color: var(--green); }

    .color-pick-wrap { display: inline-flex; align-items: center; }
    .color-pick-wrap input[type="color"] {
      width: 22px; height: 22px; border: none; border-radius: 4px;
      padding: 0; cursor: pointer; background: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="back-btn">← Effectif</a>
    <span class="nav-title">FMinito FC</span>
  </nav>

  <main id="content">
    <!-- rempli par JS -->
  </main>

  <script src="admin.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA8Gx0rGa49jQQPUaMD8SSB0Duvh7b5Gkk",
      authDomain: "fminito-fc.firebaseapp.com",
      projectId: "fminito-fc",
      storageBucket: "fminito-fc.firebasestorage.app",
      messagingSenderId: "607684709890",
      appId: "1:607684709890:web:9958dc52fe7d4c7bb0611b"
    });
    const db = firebase.firestore();

    const flagMap = {
      'France':'🇫🇷','Espagne':'🇪🇸','Angleterre':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Allemagne':'🇩🇪','Italie':'🇮🇹',
      'Portugal':'🇵🇹','Belgique':'🇧🇪','Brésil':'🇧🇷','Argentine':'🇦🇷','Pays-Bas':'🇳🇱',
      'Maroc':'🇲🇦','Algérie':'🇩🇿','Tunisie':'🇹🇳','Sénégal':'🇸🇳','Cameroun':'🇨🇲',
      'USA':'🇺🇸','Japon':'🇯🇵','Croatie':'🇭🇷','Pologne':'🇵🇱','Serbie':'🇷🇸'
    };
    function flag(c) { return (flagMap[c] || '🌍') + ' ' + c; }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    document.getElementById('content').innerHTML = `<p style="color:var(--muted);text-align:center;padding:60px">Chargement…</p>`;

    async function loadPlayer() {
      const allSnap = await db.collection('players').orderBy('createdAt').get();
      const allPlayers = allSnap.docs;
      const docRef = allPlayers.find(d => d.id === id);

      if (!docRef) {
        document.getElementById('content').innerHTML = `<p style="color:var(--muted);text-align:center;padding:60px">Joueur introuvable. <a href="index.html" style="color:var(--green)">Retour</a></p>`;
        return;
      }

      const p = { id: docRef.id, ...docRef.data() };
      const idx = allPlayers.findIndex(d => d.id === id) + 1;

      document.title = `${p.firstName} ${p.lastName} · FMinito FC`;
      const footLabel = p.foot === 'Droit' ? '🦵 Droit' : p.foot === 'Gauche' ? '🦵 Gauche' : '⚽ Ambidextre';
      const overall   = p.overall   ?? 100;
      const potential = p.potential ?? 110;

      // Applique la couleur perso si définie
      if (p.profileColor) applyColor(p.profileColor);

      document.getElementById('content').innerHTML = `
        <div class="edit-bar">
          <a href="edit.html?id=${p.id}" class="btn-edit">✏ Modifier la fiche</a>
          <button class="btn-edit" onclick="adminEditRatings()" style="cursor:pointer;border:none">⚙ Niveau (admin)</button>
          <button class="btn-edit" onclick="adminEditValue()" style="cursor:pointer;border:none">💰 Valeur & Salaire (admin)</button>
          <label class="btn-edit color-pick-wrap" title="Couleur de ta fiche" style="cursor:pointer;gap:8px">
            🎨 Couleur
            <input type="color" id="profile-color" value="${p.profileColor || '#a8c000'}"
              oninput="previewColor(this.value)"
              onchange="saveColor('${p.id}', this.value)"/>
          </label>
        </div>

        <div class="player-hero">
          <div class="hero-badge">
            <div class="badge-position">${p.position || '?'}</div>
            <div class="badge-number">N° ${String(idx).padStart(2,'0')}</div>
          </div>
          <div class="hero-info">
            <div class="hero-name">
              ${p.firstName}<br><span>${p.lastName.toUpperCase()}</span>
            </div>
            <div class="hero-tags">
              <span class="tag tag-nat">${flag(p.nationality1)}</span>
              ${p.nationality2 ? `<span class="tag tag-nat">${flag(p.nationality2)}</span>` : ''}
              <span class="tag tag-club">⚽ ${p.club}</span>
            </div>
          </div>
          <!-- OVERALL / POTENTIEL -->
          <div class="ratings-block">
            <div class="rating-item">
              <div class="rating-label">Niveau</div>
              <div class="rating-value overall" id="display-overall">${overall}</div>
            </div>
            <div class="rating-sep">→</div>
            <div class="rating-item">
              <div class="rating-label">Potentiel</div>
              <div class="rating-value potential" id="display-potential">${potential}</div>
            </div>
          </div>
        </div>

        <div class="profile-grid">

          <div class="profile-block">
            <div class="block-title">Physique</div>
            <div class="stat-row"><span class="stat-key">Taille</span><span class="stat-val">${p.height} cm</span></div>
            <div class="stat-row"><span class="stat-key">Poids</span><span class="stat-val">${p.weight} kg</span></div>
            <div class="stat-row"><span class="stat-key">IMC</span><span class="stat-val">${(p.weight / ((p.height/100)**2)).toFixed(1)}</span></div>
          </div>

          <div class="profile-block">
            <div class="block-title">Technique</div>
            <div class="stat-row"><span class="stat-key">Pied préféré</span><span class="stat-val"><span class="foot-pill">${footLabel}</span></span></div>
            <div class="stat-row"><span class="stat-key">Poste</span><span class="stat-val">${p.position || '—'}</span></div>
          </div>

          <div class="profile-block full">
            <div class="block-title">Identité</div>
            <div class="stat-row"><span class="stat-key">Nom complet</span><span class="stat-val">${p.firstName} ${p.lastName}</span></div>
            <div class="stat-row"><span class="stat-key">Nationalité</span><span class="stat-val">${flag(p.nationality1)}${p.nationality2 ? ' · ' + flag(p.nationality2) : ''}</span></div>
            <div class="stat-row"><span class="stat-key">Club de départ</span><span class="stat-val">${p.club}</span></div>
            <div class="stat-row"><span class="stat-key">Ajouté le</span><span class="stat-val">${new Date(p.createdAt).toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'})}</span></div>
          </div>

        </div>

        <!-- ROUE DU DESTIN -->
        <a href="wheel.html?id=${p.id}" class="wheel-cta-block">
          <div class="wheel-cta-left">
            <div class="wheel-cta-icon">🎰</div>
            <div>
              <div class="wheel-cta-title">Roue du Destin</div>
              <div class="wheel-cta-sub">Clique pour accéder à ta roue</div>
            </div>
          </div>
          <div class="wheel-cta-arrow">→</div>
        </a>

        <!-- BLOCS DU BAS -->
        <div class="bottom-grid">
          <a href="news.html?id=${p.id}" class="bottom-block" style="text-decoration:none;cursor:pointer;">
            <div class="bottom-block-header">
              <span class="bottom-icon">📰</span>
              <div><div class="bottom-title">Récap des News</div><div class="bottom-sub">Toutes les actus Discord sur ce joueur</div></div>
              <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);opacity:.5;margin-left:auto;">→</span>
            </div>
          </a>
          <a href="stats.html?id=${p.id}" class="bottom-block" style="text-decoration:none;cursor:pointer;">
            <div class="bottom-block-header">
              <span class="bottom-icon">📊</span>
              <div><div class="bottom-title">Performances</div><div class="bottom-sub">Buts, passes déc., matchs joués…</div></div>
              <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);opacity:.5;margin-left:auto;">→</span>
            </div>
          </a>
        </div>
      `;
    }

    async function adminOpenWheel() {
      window.location.href = 'wheel.html?id=' + id;
    }

    async function adminEditRatings() {
      if (!checkAdmin()) return;

      const doc = await db.collection('players').doc(id).get();
      const cur = doc.data();
      const newOverall = prompt('Nouveau niveau général (actuel : ' + (cur.overall ?? 100) + ') :', cur.overall ?? 100);
      if (newOverall === null) return;

      const ov = parseInt(newOverall);
      if (isNaN(ov)) { alert('Valeur invalide.'); return; }

      await db.collection('players').doc(id).update({ overall: ov });
      document.getElementById('display-overall').textContent = ov;
      alert('✔ Niveau mis à jour !');
    }

    async function adminEditValue() {
      if (!checkAdmin()) return;

      const doc = await db.collection('players').doc(id).get();
      const cur = doc.data();

      const newValue  = prompt('Valeur du joueur (actuelle : ' + (cur.value  || '—') + ') :', cur.value  || '');
      if (newValue  === null) return;
      const newSalary = prompt('Salaire du joueur (actuel : '  + (cur.salary || '—') + ') :', cur.salary || '');
      if (newSalary === null) return;

      await db.collection('players').doc(id).update({ value: newValue.trim(), salary: newSalary.trim() });
      alert('✔ Valeur & salaire mis à jour !');
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function applyColor(hex) {
      const r2 = Math.min(255, parseInt(hex.slice(1,3),16)+30);
      const g2 = Math.min(255, parseInt(hex.slice(3,5),16)+30);
      const b2 = Math.min(255, parseInt(hex.slice(5,7),16)+30);
      const hex2 = '#' + [r2,g2,b2].map(v=>v.toString(16).padStart(2,'0')).join('');
      document.documentElement.style.setProperty('--green', hex);
      document.documentElement.style.setProperty('--green2', hex2);
    }

    function previewColor(hex) { applyColor(hex); }

    async function saveColor(playerId, hex) {
      await db.collection('players').doc(playerId).update({ profileColor: hex });
    }

    loadPlayer();
  </script>
</body>
