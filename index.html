<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FMinito FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #a8c000;
      --green2: #c8e800;
      --dark:   #0a0c06;
      --mid:    #12160a;
      --card:   #181d0e;
      --border: #2a3010;
      --text:   #e8edcc;
      --muted:  #7a8555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND PITCH LINES ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(
          180deg,
          transparent 0px, transparent 58px,
          rgba(168,192,0,.04) 58px, rgba(168,192,0,.04) 60px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 118px,
          rgba(168,192,0,.03) 118px, rgba(168,192,0,.03) 120px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      gap: 24px;
    }

    .logo-img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      display: block;
      animation: pulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(168,192,0,.35));
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(168,192,0,.3)); }
      50%       { filter: drop-shadow(0 0 36px rgba(168,192,0,.6)); }
    }

    .club-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: .06em;
      line-height: 1;
      text-align: center;
      background: linear-gradient(135deg, var(--green2) 0%, var(--green) 60%, #5a6800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(168,192,0,.4));
    }

    .subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── DIVIDER ── */
    .divider {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto 48px;
      padding: 0 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .9rem;
      letter-spacing: .3em;
      color: var(--muted);
    }

    /* ── MAIN CONTENT ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .1em;
      color: var(--green);
    }

    /* ── ADD BUTTON ── */
    .btn-add {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--green);
      color: var(--dark);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      padding: 12px 22px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(168,192,0,.25);
    }
    .btn-add:hover {
      background: var(--green2);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(168,192,0,.4);
    }
    .btn-add .plus {
      font-size: 1.4rem;
      line-height: 1;
      font-weight: 300;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: rgba(168,192,0,.02);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .4;
    }
    .empty-state p {
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .05em;
    }

    /* ── PLAYER GRID ── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer;
      animation: fadeUp .4s ease both;
      display: flex;
      flex-direction: column;
    }
    .player-card .card-stats { flex: 1; }
    .player-card .card-actions { margin-top: auto; padding-top: 12px; }
    .player-card:hover {
      transform: translateY(-4px);
      border-color: var(--green);
      box-shadow: 0 8px 30px rgba(168,192,0,.15);
    }
    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green2));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      color: rgba(168,192,0,.08);
      position: absolute;
      top: 12px; right: 16px;
      letter-spacing: -.02em;
      user-select: none;
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .05em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      min-height: 58px;
      align-content: flex-start;
    }

    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      background: rgba(168,192,0,.08);
      color: var(--green);
      border: 1px solid rgba(168,192,0,.15);
    }
    .tag.club {
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-color: var(--border);
    }
    .tag.pos {
      background: rgba(168,192,0,.15);
      color: var(--green2);
      border-color: rgba(168,192,0,.3);
      font-weight: 700;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-edit {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(168,192,0,.08);
      border: 1px solid rgba(168,192,0,.2);
      color: var(--green);
      border-radius: 4px;
      padding: 7px 10px;
      font-size: .78rem;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      text-decoration: none;
      transition: all .2s;
    }
    .card-edit:hover { background: rgba(168,192,0,.18); border-color: var(--green); }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── DELETE BTN ── */
    .card-delete {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 7px 10px;
      font-size: .78rem;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      transition: all .2s;
    }
    .card-delete:hover {
      border-color: #c0392b;
      color: #c0392b;
      background: rgba(192,57,43,.08);
    }

    .wheel-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 4px;
      margin-top: 2px;
      text-align: center;
    }
    .wheel-status.done {
      background: rgba(168,192,0,.08);
      color: var(--green);
      border: 1px solid rgba(168,192,0,.2);
    }
    .wheel-status.pending {
      background: rgba(232,160,0,.06);
      color: #e8a000;
      border: 1px solid rgba(232,160,0,.2);
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      letter-spacing: .1em;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="FMinito FC Logo" class="logo-img" />
    <h1 class="club-title">FMinito FC</h1>
    <p class="subtitle">Football Manager 26 · Saison en cours</p>
  </header>

  <div class="divider"><span>⬦ Effectif ⬦</span></div>

  <main>
    <div class="section-header">
      <h2 class="section-title">Joueurs</h2>
      <a href="create.html" class="btn-add">
        <span class="plus">+</span>
        Créer un joueur
      </a>
    </div>

    <div id="roster"></div>
  </main>

  <footer>FMinito FC · FM26 · créée avec pa$$ion, ah bah non</footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA8Gx0rGa49jQQPUaMD8SSB0Duvh7b5Gkk",
      authDomain: "fminito-fc.firebaseapp.com",
      projectId: "fminito-fc",
      storageBucket: "fminito-fc.firebasestorage.app",
      messagingSenderId: "607684709890",
      appId: "1:607684709890:web:9958dc52fe7d4c7bb0611b"
    });
    const db = firebase.firestore();

    async function deletePlayer(id) {
      const pwd = prompt('Mot de passe admin :');
      if (pwd !== '0550') { alert('Mot de passe incorrect.'); return; }
      if (!confirm('Supprimer ce joueur ?')) return;
      await db.collection('players').doc(id).delete();
    }

    function footIcon(foot) {
      if (foot === 'Droit') return '🦵 Droit';
      if (foot === 'Gauche') return '🦵 Gauche';
      return '🦵 Ambidextre';
    }

    function flagEmoji(country) {
      const flags = {
        'France':'🇫🇷','Espagne':'🇪🇸','Angleterre':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Allemagne':'🇩🇪','Italie':'🇮🇹',
        'Portugal':'🇵🇹','Belgique':'🇧🇪','Brésil':'🇧🇷','Argentine':'🇦🇷','Pays-Bas':'🇳🇱',
        'Maroc':'🇲🇦','Algérie':'🇩🇿','Tunisie':'🇹🇳','Sénégal':'🇸🇳','Cameroun':'🇨🇲',
        'USA':'🇺🇸','Japon':'🇯🇵','Croatie':'🇭🇷','Pologne':'🇵🇱','Serbie':'🇷🇸'
      };
      return (flags[country] || '🌍') + ' ' + country;
    }

    function render(players) {
      const container = document.getElementById('roster');

      if (players.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚽</div>
            <p>Aucun joueur pour l'instant.<br>Clique sur <strong>+ Créer un joueur</strong> pour commencer.</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="player-grid">${
        players.map((p, i) => `
          <div class="player-card" onclick="window.location.href='player.html?id=${p.id}'">
            <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
            <div class="card-name">${p.lastName.toUpperCase()} ${p.firstName}</div>
            <div class="card-meta">
              <span class="tag">${flagEmoji(p.nationality1)}</span>
              ${p.nationality2 ? `<span class="tag">${flagEmoji(p.nationality2)}</span>` : ''}
              ${p.position ? `<span class="tag pos">${p.position}</span>` : ''}
              <span class="tag club">⚽ ${p.club}</span>
            </div>
            <div class="card-stats">
              <div class="stat-item">
                <span class="stat-label">Taille</span>
                <span class="stat-value">${p.height} cm</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Poids</span>
                <span class="stat-value">${p.weight} kg</span>
              </div>
              <div class="stat-item" style="grid-column:1/-1">
                <span class="stat-label">Pied préféré</span>
                <span class="stat-value">${footIcon(p.foot)}</span>
              </div>
            </div>
            <div class="wheel-status ${p.wheelLocked ? 'done' : 'pending'}">
              ${p.wheelLocked ? '✔ Roue tournée' : '⏳ Roue en attente'}
            </div>
            <div class="card-actions" onclick="event.stopPropagation()">
              <a href="edit.html?id=${p.id}" class="card-edit">✏ Modifier</a>
              <button class="card-delete" onclick="deletePlayer('${p.id}')">✕ Supprimer</button>
            </div>
          </div>
        `).join('')
      }</div>`;
    }

    // Écoute en temps réel — se met à jour automatiquement pour tout le monde
    document.getElementById('roster').innerHTML = `<p style="color:var(--muted);text-align:center;padding:40px">Chargement…</p>`;
    db.collection('players').orderBy('createdAt').onSnapshot(snapshot => {
      const players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render(players);
    });
  </script>
</body>
</html>
