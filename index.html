<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FMinito FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #a8c000;
      --green2: #c8e800;
      --dark:   #0a0c06;
      --mid:    #12160a;
      --card:   #181d0e;
      --border: #2a3010;
      --text:   #e8edcc;
      --muted:  #7a8555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND PITCH LINES ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(
          180deg,
          transparent 0px, transparent 58px,
          rgba(168,192,0,.04) 58px, rgba(168,192,0,.04) 60px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 118px,
          rgba(168,192,0,.03) 118px, rgba(168,192,0,.03) 120px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      gap: 24px;
    }

    .logo-img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      display: block;
      animation: pulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(168,192,0,.35));
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(168,192,0,.3)); }
      50%       { filter: drop-shadow(0 0 36px rgba(168,192,0,.6)); }
    }

    .club-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: .06em;
      line-height: 1;
      text-align: center;
      background: linear-gradient(135deg, var(--green2) 0%, var(--green) 60%, #5a6800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(168,192,0,.4));
    }

    .subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── DIVIDER ── */
    .divider {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto 48px;
      padding: 0 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .9rem;
      letter-spacing: .3em;
      color: var(--muted);
    }

    /* ── MAIN CONTENT ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .1em;
      color: var(--green);
    }

    /* ── ADD BUTTON ── */
    .btn-add {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--green);
      color: var(--dark);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      padding: 12px 22px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(168,192,0,.25);
    }
    .btn-add:hover {
      background: var(--green2);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(168,192,0,.4);
    }
    .btn-add .plus {
      font-size: 1.4rem;
      line-height: 1;
      font-weight: 300;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: rgba(168,192,0,.02);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .4;
    }
    .empty-state p {
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .05em;
    }

    /* ── PLAYER GRID ── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer;
      animation: fadeUp .4s ease both;
      display: flex;
      flex-direction: column;
    }
    .player-card .card-stats { flex: 1; }
    .player-card .card-actions { margin-top: auto; padding-top: 12px; }
    .player-card:hover {
      transform: translateY(-4px);
      border-color: var(--green);
      box-shadow: 0 8px 30px rgba(168,192,0,.15);
    }
    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green2));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      color: rgba(168,192,0,.08);
      position: absolute;
      top: 12px; right: 16px;
      letter-spacing: -.02em;
      user-select: none;
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .05em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      min-height: 58px;
      align-content: flex-start;
    }

    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      background: rgba(168,192,0,.08);
      color: var(--green);
      border: 1px solid rgba(168,192,0,.15);
    }
    .tag.club {
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-color: var(--border);
    }
    .tag.pos {
      background: rgba(168,192,0,.15);
      color: var(--green2);
      border-color: rgba(168,192,0,.3);
      font-weight: 700;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-edit {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(168,192,0,.08);
      border: 1px solid rgba(168,192,0,.2);
      color: var(--green);
      border-radius: 4px;
      padding: 7px 10px;
      font-size: .78rem;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      text-decoration: none;
      transition: all .2s;
    }
    .card-edit:hover { background: rgba(168,192,0,.18); border-color: var(--green); }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── DELETE BTN ── */
    .card-delete {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 7px 10px;
      font-size: .78rem;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      transition: all .2s;
    }
    .card-delete:hover {
      border-color: #c0392b;
      color: #c0392b;
      background: rgba(192,57,43,.08);
    }

    .wheel-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 4px;
      margin-top: 2px;
      text-align: center;
    }
    .wheel-status.done {
      background: rgba(168,192,0,.08);
      color: var(--green);
      border: 1px solid rgba(168,192,0,.2);
    }
    .wheel-status.pending {
      background: rgba(232,160,0,.06);
      color: #e8a000;
      border: 1px solid rgba(232,160,0,.2);
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      letter-spacing: .1em;
    }

    /* ── PAGE LAYOUT ── */
    .page-layout {
      display: grid;
      grid-template-columns: 200px 1fr 200px;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .page-layout { grid-template-columns: 1fr; }
    }

    /* ── RANKING PANEL ── */
    .ranking-panel {
      position: sticky;
      top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .ranking-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: .15em;
      color: var(--green); padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ranking-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .ranking-section:last-child { border-bottom: none; }
    .ranking-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted);
      padding: 0 16px 8px;
    }
    .rank-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; transition: background .15s; cursor: pointer;
    }
    .rank-row:hover { background: rgba(168,192,0,.04); }
    .rank-pos {
      font-family: 'Bebas Neue', sans-serif; font-size: .9rem;
      color: var(--muted); min-width: 18px; text-align: center;
    }
    .rank-pos.gold   { color: #f1c40f; }
    .rank-pos.silver { color: #bdc3c7; }
    .rank-pos.bronze { color: #cd7f32; }
    .rank-name {
      font-family: 'Barlow Condensed', sans-serif; font-size: .88rem;
      font-weight: 600; letter-spacing: .04em; color: var(--text); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rank-val {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      color: var(--green2);
    }
    .rank-val.pot { color: #60aaff; }
  </style>
</head>
<body>

  <header style="position:relative;">
    <img src="logo.png" alt="FMinito FC Logo" class="logo-img" />
    <h1 class="club-title">FMinito FC</h1>
    <p class="subtitle">Football Manager 26 · Saison en cours</p>
    <div id="notif-bell" style="display:none;position:absolute;top:16px;right:20px;cursor:pointer;" onclick="toggleInbox()">
      <div style="position:relative;display:inline-block;">
        <span style="font-size:1.6rem;">🔔</span>
        <span id="notif-count" style="display:none;position:absolute;top:-4px;right:-6px;background:#e74c3c;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:.75rem;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;"></span>
      </div>
    </div>
  </header>

  <!-- INBOX -->
  <div id="notif-inbox" style="display:none;position:fixed;top:60px;right:16px;width:340px;max-height:480px;overflow-y:auto;background:#1a2008;border:1px solid var(--border);border-radius:10px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.5);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--green);">🔔 Notifications</span>
      <div style="display:flex;gap:10px;align-items:center;">
        <button onclick="markAllRead()" style="background:none;border:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">Tout lire</button>
        <button onclick="toggleInbox()" style="background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;">✕</button>
      </div>
    </div>
    <div id="notif-list" style="padding:8px 0;"></div>
  </div>

  <div class="divider"><span>⬦ Effectif ⬦</span></div>

  <main>
    <div class="page-layout">
      <!-- CLASSEMENT GAUCHE -->
      <aside class="ranking-panel">
        <div class="ranking-title">🏆 Classement</div>
        <div class="ranking-section">
          <div class="ranking-label">Niveau général</div>
          <div id="rank-overall"></div>
        </div>
        <div class="ranking-section">
          <div class="ranking-label">Potentiel</div>
          <div id="rank-potential"></div>
        </div>
      </aside>

      <!-- EFFECTIF -->
      <div class="roster-col">
        <div class="section-header">
          <h2 class="section-title">Joueurs</h2>
          <div style="display:flex;gap:10px;align-items:center">
            <a href="nations.html" class="btn-add" style="background:transparent;border:1px solid var(--border);color:var(--muted);">
              🌍 Nations & Divisions
            </a>
            <a href="create.html" class="btn-add">
              <span class="plus">+</span>
              Créer un joueur
            </a>
          </div>
        </div>
        <div id="roster"></div>
      </div>

      <!-- CLASSEMENT DROITE -->
      <aside class="ranking-panel">
        <div class="ranking-title">💰 Mercato</div>
        <div class="ranking-section">
          <div class="ranking-label">Valeur</div>
          <div id="rank-value"></div>
        </div>
        <div class="ranking-section">
          <div class="ranking-label">Salaire</div>
          <div id="rank-salary"></div>
        </div>
      </aside>
    </div>
  </main>

  <footer>FMinito FC · FM26 · créée avec pa$$ion, ah bah non</footer>

  <script src="admin.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA8Gx0rGa49jQQPUaMD8SSB0Duvh7b5Gkk",
      authDomain: "fminito-fc.firebaseapp.com",
      projectId: "fminito-fc",
      storageBucket: "fminito-fc.firebasestorage.app",
      messagingSenderId: "607684709890",
      appId: "1:607684709890:web:9958dc52fe7d4c7bb0611b"
    });
    const db = firebase.firestore();

    async function deletePlayer(id) {
      if (!checkAdmin()) return;
      if (!confirm('Supprimer ce joueur ?')) return;
      await db.collection('players').doc(id).delete();
    }

    function footIcon(foot) {
      if (foot === 'Droit') return '🦵 Droit';
      if (foot === 'Gauche') return '🦵 Gauche';
      return '🦵 Ambidextre';
    }

    function flagEmoji(country) {
      const flags = {
        'France':'🇫🇷','Espagne':'🇪🇸','Angleterre':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Allemagne':'🇩🇪','Italie':'🇮🇹',
        'Portugal':'🇵🇹','Belgique':'🇧🇪','Brésil':'🇧🇷','Argentine':'🇦🇷','Pays-Bas':'🇳🇱',
        'Maroc':'🇲🇦','Algérie':'🇩🇿','Tunisie':'🇹🇳','Sénégal':'🇸🇳','Cameroun':'🇨🇲',
        'USA':'🇺🇸','Japon':'🇯🇵','Croatie':'🇭🇷','Pologne':'🇵🇱','Serbie':'🇷🇸'
      };
      return (flags[country] || '🌍') + ' ' + country;
    }

    function render(players) {
      const container = document.getElementById('roster');

      if (players.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚽</div>
            <p>Aucun joueur pour l'instant.<br>Clique sur <strong>+ Créer un joueur</strong> pour commencer.</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="player-grid">${
        players.map((p, i) => `
          <div class="player-card" onclick="window.location.href='player.html?id=${p.id}'">
            <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
            <div class="card-name">${p.lastName.toUpperCase()} ${p.firstName}</div>
            <div class="card-meta">
              <span class="tag">${flagEmoji(p.nationality1)}</span>
              ${p.nationality2 ? `<span class="tag">${flagEmoji(p.nationality2)}</span>` : ''}
              ${p.position ? `<span class="tag pos">${p.position}</span>` : ''}
              <span class="tag club">⚽ ${p.club}</span>
            </div>
            <div class="card-stats">
              <div class="stat-item">
                <span class="stat-label">Taille</span>
                <span class="stat-value">${p.height} cm</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Poids</span>
                <span class="stat-value">${p.weight} kg</span>
              </div>
              <div class="stat-item" style="grid-column:1/-1">
                <span class="stat-label">Pied préféré</span>
                <span class="stat-value">${footIcon(p.foot)}</span>
              </div>
            </div>
            <div class="wheel-status ${p.wheelLocked ? 'done' : 'pending'}">
              ${p.wheelLocked ? '✔ Roue tournée' : '⏳ Roue en attente'}
            </div>
            <div class="card-actions" onclick="event.stopPropagation()">
              <a href="edit.html?id=${p.id}" class="card-edit">✏ Modifier</a>
              <button class="card-delete" onclick="deletePlayer('${p.id}')">✕ Supprimer</button>
            </div>
          </div>
        `).join('')
      }</div>`;
    }

    function renderRanking(players) {
      const medal = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

      const byOverall = [...players].sort((a,b) => (b.overall??100) - (a.overall??100));
      document.getElementById('rank-overall').innerHTML = byOverall.map((p, i) => `
        <div class="rank-row" onclick="window.location.href='player.html?id=${p.id}'">
          <span class="rank-pos ${medal(i)}">${i+1}</span>
          <span class="rank-name">${p.firstName} ${p.lastName}</span>
          <span class="rank-val">${p.overall ?? 100}</span>
        </div>`).join('');

      const byPotential = [...players].sort((a,b) => (b.potential??110) - (a.potential??110));
      document.getElementById('rank-potential').innerHTML = byPotential.map((p, i) => `
        <div class="rank-row" onclick="window.location.href='player.html?id=${p.id}'">
          <span class="rank-pos ${medal(i)}">${i+1}</span>
          <span class="rank-name">${p.firstName} ${p.lastName}</span>
          <span class="rank-val pot">${p.potential ?? 110}</span>
        </div>`).join('');

      // Valeur — on affiche même sans valeur (—)
      const byValue = [...players].sort((a,b) => {
        const va = parseFloat((a.value||'0').replace(/[^0-9.]/g,'')) || 0;
        const vb = parseFloat((b.value||'0').replace(/[^0-9.]/g,'')) || 0;
        return vb - va;
      });
      document.getElementById('rank-value').innerHTML = byValue.map((p, i) => `
        <div class="rank-row" onclick="window.location.href='player.html?id=${p.id}'">
          <span class="rank-pos ${medal(i)}">${i+1}</span>
          <span class="rank-name">${p.firstName} ${p.lastName}</span>
          <span class="rank-val" style="color:#e8a000;font-size:.85rem">${p.value || '—'}</span>
        </div>`).join('');

      // Salaire
      const bySalary = [...players].sort((a,b) => {
        const sa = parseFloat((a.salary||'0').replace(/[^0-9.]/g,'')) || 0;
        const sb = parseFloat((b.salary||'0').replace(/[^0-9.]/g,'')) || 0;
        return sb - sa;
      });
      document.getElementById('rank-salary').innerHTML = bySalary.map((p, i) => `
        <div class="rank-row" onclick="window.location.href='player.html?id=${p.id}'">
          <span class="rank-pos ${medal(i)}">${i+1}</span>
          <span class="rank-name">${p.firstName} ${p.lastName}</span>
          <span class="rank-val" style="color:#e8a000;font-size:.85rem">${p.salary || '—'}</span>
        </div>`).join('');
    }

    // ── SYSTÈME DE NOTIFICATIONS ADMIN ──
    let notifUnsubscribe = null;
    let inboxOpen = false;
    let knownNotifIds = new Set();

    function initNotifications() {
      if (!isAdmin()) return;
      document.getElementById('notif-bell').style.display = 'block';

      notifUnsubscribe = db.collection('notifications')
        .orderBy('createdAt', 'desc')
        .onSnapshot(snapshot => {
          const notifs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          const unread = notifs.filter(n => !n.read);

          // Badge
          const countEl = document.getElementById('notif-count');
          if (unread.length > 0) {
            countEl.style.display = 'flex';
            countEl.textContent = unread.length;
          } else {
            countEl.style.display = 'none';
          }

          // Son + notif navigateur pour les nouvelles
          notifs.forEach(n => {
            if (!n.read && !knownNotifIds.has(n.id)) {
              knownNotifIds.add(n.id);
              if (knownNotifIds.size > 1) playNotifSound(); // pas au premier chargement
              if (Notification.permission === 'granted') {
                new Notification('🎰 Roue terminée !', {
                  body: n.playerName + ' a terminé sa roue du destin.',
                  icon: 'logo.png'
                });
              }
            }
          });

          renderInbox(notifs);
        });

      // Demande permission notifs navigateur
      if (Notification.permission === 'default') Notification.requestPermission();
    }

    function renderInbox(notifs) {
      const list = document.getElementById('notif-list');
      if (!notifs.length) {
        list.innerHTML = '<p style="padding:20px;text-align:center;font-family:\'Barlow Condensed\',sans-serif;font-size:.9rem;letter-spacing:.06em;color:var(--muted);">Aucune notification</p>';
        return;
      }
      list.innerHTML = notifs.map(n => `
        <div onclick="markRead('${n.id}')" style="padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;background:${n.read ? 'transparent' : 'rgba(168,192,0,.04)'};transition:background .2s;" onmouseover="this.style.background='rgba(168,192,0,.06)'" onmouseout="this.style.background='${n.read ? 'transparent' : 'rgba(168,192,0,.04)'}'">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            ${!n.read ? '<span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;"></span>' : '<span style="width:7px;height:7px;display:inline-block;flex-shrink:0;"></span>'}
            <span style="font-family:\'Bebas Neue\',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--text);">🎰 ${n.playerName}</span>
          </div>
          <div style="font-family:\'Barlow Condensed\',sans-serif;font-size:.82rem;letter-spacing:.05em;color:var(--muted);margin-left:15px;">${n.summary}</div>
          ${n.potGain > 0 ? '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:.78rem;color:#60aaff;margin-left:15px;margin-top:2px;">📈 +' + n.potGain + ' potentiel</div>' : ''}
          <div style="font-family:\'Barlow Condensed\',sans-serif;font-size:.72rem;color:var(--muted);opacity:.5;margin-left:15px;margin-top:4px;">${new Date(n.createdAt).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
        </div>`).join('');
    }

    function toggleInbox() {
      inboxOpen = !inboxOpen;
      document.getElementById('notif-inbox').style.display = inboxOpen ? 'block' : 'none';
    }

    async function markRead(id) {
      await db.collection('notifications').doc(id).update({ read: true });
    }

    async function markAllRead() {
      const snap = await db.collection('notifications').where('read','==',false).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.update(d.ref, { read: true }));
      await batch.commit();
    }

    function playNotifSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } catch(e) {}
    }

    // Lance les notifs si admin au chargement
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if (isAdmin()) initNotifications(); }, 500);
    });

    // Réactive si admin mode activé via CTRL+M
    const _origShowBadge = window.showAdminBadge;
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'm' && !isAdmin()) {
        setTimeout(() => { if (isAdmin()) initNotifications(); }, 100);
      }
    });
    document.getElementById('roster').innerHTML = `<p style="color:var(--muted);text-align:center;padding:40px">Chargement…</p>`;
    db.collection('players').orderBy('createdAt').onSnapshot(snapshot => {
      const players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render(players);
      renderRanking(players);
    });
  </script>
</body>
</html>
