<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roue du Destin · FMinito FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #a8c000;
      --green2: #c8e800;
      --dark:   #0a0c06;
      --card:   #181d0e;
      --border: #2a3010;
      --text:   #e8edcc;
      --muted:  #7a8555;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(180deg, transparent 0px, transparent 58px, rgba(168,192,0,.04) 58px, rgba(168,192,0,.04) 60px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 118px, rgba(168,192,0,.03) 118px, rgba(168,192,0,.03) 120px);
      pointer-events: none; z-index: 0;
    }
    nav { position: relative; z-index: 1; display: flex; align-items: center; gap: 16px; padding: 20px 40px; border-bottom: 1px solid var(--border); }
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-size: .95rem; letter-spacing: .08em; text-transform: uppercase; transition: color .2s; }
    .back-btn:hover { color: var(--green); }
    .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .1em; color: var(--green); margin-left: auto; }
    main { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 40px 24px 80px; display: flex; flex-direction: column; align-items: center; gap: 24px; }

    .player-banner { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .banner-pos { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--green); background: rgba(168,192,0,.08); border: 1px solid rgba(168,192,0,.2); border-radius: 6px; padding: 4px 14px; line-height: 1.3; }
    .banner-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: .05em; }
    .banner-name span { color: var(--green); }
    .banner-club { font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

    /* PHASE SELECT */
    #phase-select { width: 100%; display: flex; flex-direction: column; gap: 20px; }
    .s-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .s-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .15em; color: var(--green); padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .s-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .s-body { padding: 20px; }

    .spin-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .spin-opt { position: relative; }
    .spin-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .spin-opt label { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 72px; height: 72px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--muted); background: rgba(255,255,255,.02); transition: all .15s; gap: 2px; }
    .spin-opt label small { font-family: 'Barlow Condensed', sans-serif; font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; }
    .spin-opt input:checked + label { border-color: var(--green); background: rgba(168,192,0,.12); color: var(--green2); box-shadow: 0 0 14px rgba(168,192,0,.2); }
    .spin-opt label:hover { border-color: rgba(168,192,0,.4); color: var(--text); }

    .repartition { display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; letter-spacing: .06em; }
    .pill-a { background: rgba(168,192,0,.1); color: var(--green); border: 1px solid rgba(168,192,0,.25); }
    .pill-p { background: rgba(96,170,255,.1); color: #60aaff; border: 1px solid rgba(96,170,255,.25); }
    .pill-t { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--text); }

    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .leg-block { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
    .leg-ttl { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
    .leg-ttl.a { color: var(--green); } .leg-ttl.p { color: #60aaff; }
    .leg-row { display: flex; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; color: var(--muted); margin-bottom: 4px; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-row b { color: var(--text); }

    .btn-confirm { width: 100%; background: var(--green); color: var(--dark); border: none; border-radius: 6px; padding: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: .1em; cursor: pointer; transition: background .2s, transform .15s; box-shadow: 0 4px 20px rgba(168,192,0,.25); }
    .btn-confirm:hover { background: var(--green2); transform: translateY(-2px); }

    /* PHASE SPIN */
    #phase-spin { width: 100%; display: none; flex-direction: column; align-items: center; gap: 20px; }
    .turn-bar { display: flex; align-items: center; gap: 10px; }
    .turn-badge { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .1em; padding: 6px 16px; border-radius: 20px; }
    .turn-badge.a { background: rgba(168,192,0,.12); color: var(--green); border: 1px solid rgba(168,192,0,.25); }
    .turn-badge.p { background: rgba(96,170,255,.12); color: #60aaff; border: 1px solid rgba(96,170,255,.25); }
    .turn-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .wheel-wrap { position: relative; width: 340px; height: 340px; filter: drop-shadow(0 0 24px rgba(168,192,0,.2)); }
    .ptr { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid var(--green2); filter: drop-shadow(0 0 6px rgba(200,232,0,.6)); z-index: 10; }

    .btn-spin { background: var(--green); color: var(--dark); font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .1em; border: none; border-radius: 8px; padding: 14px 56px; cursor: pointer; box-shadow: 0 6px 24px rgba(168,192,0,.35); transition: background .2s, transform .15s, box-shadow .2s; }
    .btn-spin:hover:not(:disabled) { background: var(--green2); transform: translateY(-2px); box-shadow: 0 10px 36px rgba(168,192,0,.5); }
    .btn-spin:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; font-size: 1rem; padding: 14px 32px; }

    .result-toast { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; text-align: center; display: none; animation: fadeUp .35s ease both; }
    .result-toast.visible { display: block; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    .rt-label { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .rt-val { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; }

    .log { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .log-row { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 18px; animation: fadeUp .3s ease both; }
    .log-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--muted); min-width: 24px; }
    .log-t { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; }
    .log-t.a { background: rgba(168,192,0,.1); color: var(--green); }
    .log-t.p { background: rgba(96,170,255,.1); color: #60aaff; }
    .log-v { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; margin-left: auto; }

    @media (max-width: 480px) { .wheel-wrap { width: 280px; height: 280px; } nav { padding: 16px 20px; } .spin-opt label { width: 58px; height: 58px; font-size: 1.6rem; } }

    /* AUTH */
    .auth-box { width: 100%; max-width: 460px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 36px 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .08em; color: var(--green); }
    .auth-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); text-align: center; }
    .auth-fields { display: flex; align-items: center; gap: 16px; width: 100%; flex-wrap: wrap; justify-content: center; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
    .auth-field label { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .auth-field input { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .3em; text-align: center; padding: 12px 8px; outline: none; transition: border-color .2s; width: 100%; }
    .auth-field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(168,192,0,.12); }
    .auth-sep { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .1em; color: var(--muted); padding-top: 18px; }
    .auth-error { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .06em; color: #e74c3c; display: none; text-align: center; }

    .locked-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 40px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }    .locked-icon { font-size: 2.5rem; opacity: .5; }
    .locked-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .08em; color: var(--text); }
    .locked-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .btn-unlock { margin-top: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 9px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    .btn-unlock:hover { border-color: var(--green); color: var(--green); }

    .date-banner {
      width: 100%; background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.4);
      border-radius: 8px; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .date-banner-text { display: flex; align-items: center; gap: 12px; }
    .date-banner-icon { font-size: 1.5rem; flex-shrink: 0; }
    .date-banner-msg {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; color: #e74c3c; line-height: 1.4;
    }
    .date-banner-msg span { color: #ff6b6b; }
    .btn-change-date { background: transparent; border: 1px solid rgba(192,57,43,.4); color: rgba(231,76,60,.6); border-radius: 4px; padding: 6px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
    .btn-change-date:hover { border-color: #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>
  <nav>
    <a id="back-link" href="index.html" class="back-btn">← Fiche joueur</a>
    <span class="nav-title">Roue du Destin</span>
  </nav>
  <main id="main"><p style="color:var(--muted);text-align:center;padding:40px">Chargement…</p></main>

  <script src="admin.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA8Gx0rGa49jQQPUaMD8SSB0Duvh7b5Gkk",
      authDomain: "fminito-fc.firebaseapp.com",
      projectId: "fminito-fc",
      storageBucket: "fminito-fc.firebasestorage.app",
      messagingSenderId: "607684709890",
      appId: "1:607684709890:web:9958dc52fe7d4c7bb0611b"
    });
    const db = firebase.firestore();

    const params   = new URLSearchParams(window.location.search);
    const playerId = params.get('id');
    document.getElementById('back-link').href = 'player.html?id=' + playerId;

    // Codes d'accès par joueur
    const PLAYER_CODES = {
      'C9jIpBfySPlgYWPd2bNu': '3847', // Typowa
      'CrTJ9JZzZATlMWxQSiFV': '6219', // Gregdj
      'zbp0CwSWvPSq33K02QmL': '7531', // Benpool
      '84SXtIgWbIWHC78gSzhR': '4906', // Wolverine
      'RZIxpbW9C74fCoZNr1p9': '2873', // Reozcoca
      'hvi7P2vkHNDddWJH7h1N': '5164', // Polo
      'A82kItDITLz1slzfFBnW': '9273', // Nathananas
      'KPOv4VIFREwVLg1NQUtO': '4718', // Mel
      '5wjQuhrj3rQXwIsPYHxu': '6382', // LastCat
    };

    function checkAccess() {
      return new Promise(resolve => {
        // Si mode admin déjà actif, accès direct
        if (isAdmin()) { resolve('admin'); return; }

        const playerCode = PLAYER_CODES[playerId];
        document.getElementById('main').innerHTML = `
          <div class="auth-box">
            <div class="auth-title">🔐 Accès Roue du Destin</div>
            <div class="auth-sub">Entre ton code personnel pour accéder à ta roue</div>
            <div class="auth-fields">
              <div class="auth-field">
                <label>Ton code</label>
                <input type="password" id="player-code" maxlength="4" placeholder="••••" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
              </div>
              <div class="auth-sep">ou</div>
              <div class="auth-field">
                <label>Code admin</label>
                <input type="password" id="admin-code" maxlength="4" placeholder="••••" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
              </div>
            </div>
            <div class="auth-error" id="auth-error"></div>
            <button class="btn-confirm" onclick="submitAuth()">→ Accéder</button>
          </div>`;

        window.submitAuth = function() {
          const pc = document.getElementById('player-code').value.trim();
          const ac = document.getElementById('admin-code').value.trim();
          const err = document.getElementById('auth-error');
          if (ac === '0550') { resolve('admin'); return; }
          if (playerCode && pc === playerCode) { resolve('player'); return; }
          err.textContent = '❌ Code incorrect. Réessaie.';
          err.style.display = 'block';
          document.getElementById('player-code').value = '';
          document.getElementById('admin-code').value = '';
        };

        document.addEventListener('keydown', function handler(e) {
          if (e.key === 'Enter') {
            document.removeEventListener('keydown', handler);
            window.submitAuth();
          }
        });
      });
    }

    // Segments de base (mélangés avant chaque tour)
    const ATTR_BASE = [
      ...Array(5).fill({ label:'+1', color:'#2d4a0a', val:1 }),
      ...Array(4).fill({ label:'+2', color:'#486010', val:2 }),
      ...Array(3).fill({ label:'+3', color:'#6a8c10', val:3 }),
      ...Array(2).fill({ label:'+4', color:'#92b000', val:4 }),
      ...Array(1).fill({ label:'+5', color:'#c8e800', val:5 }),
    ].map(s=>({...s}));

    const POT_BASE = [
      ...Array(3).fill({ label:'+5',  color:'#0e2a6e', val:5  }),
      ...Array(2).fill({ label:'+10', color:'#1a52b8', val:10 }),
      ...Array(1).fill({ label:'+15', color:'#60aaff', val:15 }),
    ].map(s=>({...s}));

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    let spinQueue=[], currentSpin=0, results=[], spinning=false, currentAngle=0;
    let canvas, ctx, activeSegs=[];

    async function init() {
      await checkAccess();

      const doc = await db.collection('players').doc(playerId).get();
      if (!doc.exists) { document.getElementById('main').innerHTML = '<p style="color:var(--muted);text-align:center;padding:60px">Joueur introuvable.</p>'; return; }
      const p = doc.data();

      // Récupère la date de déverrouillage globale
      let unlockDate = '3 avril';
      try {
        const cfg = await db.collection('config').doc('wheel').get();
        if (cfg.exists && cfg.data().unlockDate) unlockDate = cfg.data().unlockDate;
      } catch(e) {}

      // Vérifie si les tours sont déjà finis
      if (p.wheelLocked) {
        renderBanner(p);
        renderLocked(p.wheelResults || []);
        return;
      }

      // Vérifie s'il y a une session en cours (tours partiellement faits)
      if (p.wheelSession && p.wheelSession.spinQueue && p.wheelSession.currentSpin > 0) {
        spinQueue   = p.wheelSession.spinQueue;
        currentSpin = p.wheelSession.currentSpin;
        results     = p.wheelSession.results || [];
        renderBanner(p);
        renderSelectPhase(unlockDate);
        showSpinPhase();
        return;
      }

      renderBanner(p);
      renderSelectPhase(unlockDate);
      updateRep();
    }

    function renderBanner(p) {
      document.getElementById('main').innerHTML = `
        <div class="player-banner">
          <div class="banner-pos">${p.position||'?'}</div>
          <div>
            <div class="banner-name">${p.firstName} <span>${p.lastName.toUpperCase()}</span></div>
            <div class="banner-club">⚽ ${p.club}</div>
          </div>
        </div>
        <div id="content" style="width:100%;display:flex;flex-direction:column;gap:20px"></div>`;
    }

    function renderLocked(savedResults) {
      document.getElementById('content').innerHTML = `
        <div class="locked-box">
          <div class="locked-icon">🔒</div>
          <div class="locked-title">Roue terminée</div>
          <div class="locked-sub">Les tours ont déjà été effectués pour ce joueur.</div>
          <button class="btn-unlock" onclick="adminUnlock()">⚙ Débloquer (admin)</button>
        </div>
        ${savedResults.length ? `
          <div class="s-card" style="width:100%">
            <div class="s-title">Résultats de la session</div>
            <div class="s-body">
              <div class="log" id="log">${savedResults.map(r=>`
                <div class="log-row">
                  <span class="log-n">${r.n}</span>
                  <span class="log-t ${r.type==='a'?'a':'p'}">${r.type==='a'?'Attributs':'Potentiel'}</span>
                  <span class="log-v" style="color:${r.type==='a'?'var(--green2)':'#60aaff'}">${r.label}</span>
                </div>`).join('')}
              </div>
            </div>
          </div>` : ''}
      `;
    }

    async function adminUnlock() {
      if (!checkAdmin()) return;
      await db.collection('players').doc(playerId).update({ wheelLocked: false, wheelResults: [], wheelSession: null });
      location.reload();
    }

    async function changeUnlockDate() {
      if (!checkAdmin()) return;
      const newDate = prompt('Nouvelle date (ex: 5 avril) :', document.getElementById('unlock-date-txt')?.textContent || '3 avril');
      if (!newDate) return;
      await db.collection('config').doc('wheel').set({ unlockDate: newDate });
      document.getElementById('unlock-date-txt').textContent = newDate;
      alert('✔ Date mise à jour !');
    }

    function renderSelectPhase(unlockDate) {
      document.getElementById('content').innerHTML = `
        <div id="phase-select" style="width:100%;display:flex;flex-direction:column;gap:20px">
          <div class="s-card">
            <div class="s-title">Choix des tours</div>
            <div class="s-body">
              <p style="font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;text-align:center">Combien de tours pour les <b style="color:var(--green)">attributs</b> ?</p>
              <div class="spin-options">
                ${[1,2,3,4,5].map(n=>`
                  <div class="spin-opt">
                    <input type="radio" name="as" id="o${n}" value="${n}" ${n===3?'checked':''} onchange="updateRep()"/>
                    <label for="o${n}">${n}<small>tour${n>1?'s':''}</small></label>
                  </div>`).join('')}
              </div>
              <div class="repartition">
                <span class="pill pill-a" id="pa">🎯 3 attributs</span>
                <span style="color:var(--muted)">+</span>
                <span class="pill pill-p" id="pp">📈 2 potentiel</span>
                <span style="color:var(--muted)">=</span>
                <span class="pill-t">5 tours</span>
              </div>
            </div>
          </div>
          <div class="s-card">
            <div class="s-title">Contenu des roues</div>
            <div class="s-body">
              <div class="legend-grid">
                <div class="leg-block"><div class="leg-ttl a">🎯 Attributs</div>
                  <div class="leg-row"><span>+1</span><b>× 5 cases</b></div>
                  <div class="leg-row"><span>+2</span><b>× 4 cases</b></div>
                  <div class="leg-row"><span>+3</span><b>× 3 cases</b></div>
                  <div class="leg-row"><span>+4</span><b>× 2 cases</b></div>
                  <div class="leg-row"><span>+5</span><b>× 1 case</b></div>
                </div>
                <div class="leg-block"><div class="leg-ttl p">📈 Potentiel</div>
                  <div class="leg-row"><span>+5</span><b>× 3 cases</b></div>
                  <div class="leg-row"><span>+10</span><b>× 2 cases</b></div>
                  <div class="leg-row"><span>+15</span><b>× 1 case</b></div>
                </div>
              </div>
            </div>
          </div>
          <button class="btn-confirm" onclick="startSpins()">🎰 Confirmer et lancer</button>
        </div>
        <div id="phase-spin" style="width:100%;display:none;flex-direction:column;align-items:center;gap:20px">
          <div class="turn-bar">
            <div class="turn-badge a" id="tbadge">Tour 1 / 5</div>
            <div class="turn-sub" id="tsub">Attributs</div>
          </div>
          <div class="wheel-wrap">
            <div class="ptr"></div>
            <canvas id="wheelCanvas" width="340" height="340"></canvas>
          </div>
          <button class="btn-spin" id="btn-spin" onclick="doSpin()">🎰 Lancer</button>
          <div class="result-toast" id="rtost">
            <div class="rt-label" id="rlabel"></div>
            <div class="rt-val"   id="rval"></div>
          </div>
          <div class="log" id="log"></div>
        </div>
      `;
    }

    function updateRep() {
      const v = parseInt(document.querySelector('input[name="as"]:checked')?.value||3);
      document.getElementById('pa').textContent = `🎯 ${v} attribut${v>1?'s':''}`;
      document.getElementById('pp').textContent = `📈 ${5-v} potentiel`;
    }

    function startSpins() {
      const a = parseInt(document.querySelector('input[name="as"]:checked').value);
      spinQueue   = [...Array(a).fill('a'), ...Array(5-a).fill('p')];
      currentSpin = 0; results = []; currentAngle = 0;

      // Sauvegarde la file de tours dès le départ
      db.collection('players').doc(playerId).update({
        wheelSession: { spinQueue, currentSpin, results }
      });

      showSpinPhase();
    }

    function showSpinPhase() {
      document.getElementById('phase-select') && (document.getElementById('phase-select').style.display = 'none');
      const ps = document.getElementById('phase-spin');
      ps.style.display = 'flex';
      canvas = document.getElementById('wheelCanvas');
      ctx    = canvas.getContext('2d');
      renderLog();
      updateTurnUI();
      prepAndDraw();
      document.getElementById('btn-spin').disabled = false;
    }

    function prepAndDraw() {
      // Mélange les segments pour ce tour
      activeSegs = shuffle(spinQueue[currentSpin]==='a' ? ATTR_BASE : POT_BASE);
      currentAngle = 0;
      drawWheel();
    }

    function updateTurnUI() {
      const t=spinQueue[currentSpin];
      const b=document.getElementById('tbadge');
      b.textContent=`Tour ${currentSpin+1} / ${spinQueue.length}`;
      b.className=`turn-badge ${t}`;
      document.getElementById('tsub').textContent=t==='a'?'Attributs':'Potentiel';
    }

    function drawWheel() {
      const segs=activeSegs, n=segs.length;
      const cx=canvas.width/2, cy=canvas.height/2, r=cx-4, arc=(2*Math.PI)/n;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      segs.forEach((seg,i)=>{
        const s=currentAngle+i*arc, e=s+arc;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
        ctx.fillStyle=seg.color; ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=2; ctx.stroke();
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+arc/2);
        ctx.textAlign='right'; ctx.fillStyle='#fff';
        ctx.font=`bold ${n>10?15:20}px "Bebas Neue",sans-serif`;
        ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=5;
        ctx.fillText(seg.label,r-10,6); ctx.restore();
      });
      ctx.beginPath(); ctx.arc(cx,cy,16,0,2*Math.PI);
      ctx.fillStyle='#0a0c06'; ctx.fill();
      ctx.strokeStyle='rgba(168,192,0,.5)'; ctx.lineWidth=2; ctx.stroke();
    }

    function doSpin() {
      if(spinning) return;
      spinning=true;
      document.getElementById('btn-spin').disabled=true;
      document.getElementById('rtost').classList.remove('visible');
      const extra=5+Math.floor(Math.random()*5);
      const rand=Math.random()*2*Math.PI;
      const total=extra*2*Math.PI+rand;
      const dur=3500+Math.random()*1500;
      const t0=performance.now(), a0=currentAngle;
      const ease=t=>1-Math.pow(1-t,4);
      function step(now){
        const prog=Math.min((now-t0)/dur,1);
        currentAngle=a0+total*ease(prog);
        drawWheel();
        if(prog<1){ requestAnimationFrame(step); } else { spinning=false; revealResult(); }
      }
      requestAnimationFrame(step);
    }

    async function revealResult() {
      const type=spinQueue[currentSpin];
      const n=activeSegs.length, arc=(2*Math.PI)/n;
      const norm=(((-currentAngle-Math.PI/2)%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const seg=activeSegs[Math.floor(norm/arc)%n];
      results.push({n:currentSpin+1,type,label:seg.label,val:seg.val});
      currentSpin++;

      const toast=document.getElementById('rtost');
      document.getElementById('rlabel').textContent=`Tour ${currentSpin} · ${type==='a'?'Attributs':'Potentiel'}`;
      const rv=document.getElementById('rval');
      rv.textContent=seg.label; rv.style.color=type==='a'?'var(--green2)':'#60aaff';
      toast.classList.remove('visible'); void toast.offsetWidth; toast.classList.add('visible');
      renderLog();

      if(currentSpin<spinQueue.length){
        // Sauvegarde la progression
        await db.collection('players').doc(playerId).update({
          wheelSession: { spinQueue, currentSpin, results }
        });
        updateTurnUI();
        prepAndDraw();
        document.getElementById('btn-spin').disabled=false;
      } else {
        // Calcule le gain de potentiel total
        const potGain = results.filter(r=>r.type==='p').reduce((sum,r)=>sum+r.val, 0);

        // Récupère le potentiel actuel et met à jour
        const playerDoc = await db.collection('players').doc(playerId).get();
        const currentPotential = playerDoc.data().potential ?? 110;
        await db.collection('players').doc(playerId).update({
          wheelLocked: true,
          wheelResults: results,
          wheelSession: null,
          potential: currentPotential + potGain
        });

        const btn=document.getElementById('btn-spin');
        btn.textContent='🔒 Tous les tours ont été effectués';
        btn.disabled=true;

        if (potGain > 0) {
          const info = document.createElement('div');
          info.style.cssText = 'margin-top:12px;background:rgba(96,170,255,.1);border:1px solid rgba(96,170,255,.25);border-radius:6px;padding:12px 20px;text-align:center;font-family:"Bebas Neue",sans-serif;font-size:1.2rem;color:#60aaff;letter-spacing:.06em;';
          info.textContent = `📈 Potentiel mis à jour automatiquement : +${potGain} → ${currentPotential + potGain}`;
          btn.parentNode.insertBefore(info, btn.nextSibling);
        }
      }
    }

    function renderLog(){
      document.getElementById('log').innerHTML=results.map(r=>`
        <div class="log-row">
          <span class="log-n">${r.n}</span>
          <span class="log-t ${r.type==='a'?'a':'p'}">${r.type==='a'?'Attributs':'Potentiel'}</span>
          <span class="log-v" style="color:${r.type==='a'?'var(--green2)':'#60aaff'}">${r.label}</span>
        </div>`).join('');
    }

    init();
  </script>
</body>
</html>
