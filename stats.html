<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Performances · FMinito FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#a8c000;--green2:#c8e800;--dark:#0a0c06;--card:#181d0e;--border:#2a3010;--text:#e8edcc;--muted:#7a8555;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(168,192,0,.04) 58px,rgba(168,192,0,.04) 60px),repeating-linear-gradient(90deg,transparent 0px,transparent 118px,rgba(168,192,0,.03) 118px,rgba(168,192,0,.03) 120px);pointer-events:none;z-index:0;}
    nav{position:relative;z-index:1;display:flex;align-items:center;gap:16px;padding:20px 40px;border-bottom:1px solid var(--border);}
    .back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;}
    .back-btn:hover{color:var(--green);}
    .nav-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--green);margin-left:auto;}
    main{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:40px 24px 80px;display:flex;flex-direction:column;gap:20px;}

    .player-banner{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 24px;display:flex;align-items:center;gap:16px;}
    .banner-pos{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--green);background:rgba(168,192,0,.08);border:1px solid rgba(168,192,0,.2);border-radius:6px;padding:4px 14px;line-height:1.3;}
    .banner-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;}
    .banner-name span{color:var(--green);}
    .banner-club{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

    .info-msg{background:rgba(168,192,0,.05);border:1px solid rgba(168,192,0,.15);border-radius:8px;padding:14px 18px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;gap:10px;}
    .info-msg span{font-size:1.1rem;}

    .actions-bar{display:flex;gap:10px;flex-wrap:wrap;}
    .btn-admin{display:flex;align-items:center;gap:8px;background:rgba(168,192,0,.08);border:1px solid rgba(168,192,0,.25);color:var(--green);border-radius:5px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .btn-admin:hover{background:rgba(168,192,0,.16);border-color:var(--green);}
    .btn-add-season{background:var(--green);color:var(--dark);border:none;border-radius:5px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
    .btn-add-season:hover{background:var(--green2);}

    /* SEASON CARD */
    .season-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .season-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(168,192,0,.03);}
    .season-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;color:var(--text);}
    .season-name.total{color:var(--green2);}
    .btn-edit-season{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .btn-edit-season:hover{border-color:var(--green);color:var(--green);}

    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0;}
    .stat-cell{padding:16px 20px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .stat-cell:last-child{border-right:none;}
    .stat-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:var(--text);}
    .stat-val.highlight{color:var(--green2);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;}
    .modal-box{background:#1a2008;border:1px solid var(--border);border-radius:12px;width:min(440px,95vw);padding:28px;display:flex;flex-direction:column;gap:16px;}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;color:var(--green);}
    .modal-field{display:flex;flex-direction:column;gap:6px;}
    .modal-field label{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .modal-field input{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.95rem;padding:10px 12px;outline:none;transition:border-color .2s;width:100%;}
    .modal-field input:focus{border-color:var(--green);}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
    .btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .btn-save{background:var(--green);color:var(--dark);border:none;border-radius:5px;padding:10px 24px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
    .btn-save:hover{background:var(--green2);}
  </style>
</head>
<body>
  <nav>
    <a id="back-link" href="index.html" class="back-btn">← Fiche joueur</a>
    <span class="nav-title">FMinito FC</span>
  </nav>
  <main id="main"><p style="color:var(--muted);text-align:center;padding:60px">Chargement…</p></main>

  <script src="admin.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyA8Gx0rGa49jQQPUaMD8SSB0Duvh7b5Gkk",
      authDomain:"fminito-fc.firebaseapp.com",
      projectId:"fminito-fc",
      storageBucket:"fminito-fc.firebasestorage.app",
      messagingSenderId:"607684709890",
      appId:"1:607684709890:web:9958dc52fe7d4c7bb0611b"
    });
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const playerId = params.get('id');
    document.getElementById('back-link').href = 'player.html?id=' + playerId;

    let playerData = null;
    let seasons = [];

    const DEFAULT_STATS = { apps:0, goals:0, assists:0, avgRating:'—' };

    async function init() {
      const doc = await db.collection('players').doc(playerId).get();
      if (!doc.exists) { document.getElementById('main').innerHTML='<p style="color:var(--muted);text-align:center;padding:60px">Joueur introuvable.</p>'; return; }
      playerData = doc.data();

      const snap = await db.collection('players').doc(playerId).collection('seasons').orderBy('createdAt').get();
      seasons = snap.docs.map(d => ({id:d.id,...d.data()}));

      // Crée la saison 2025/2026 si elle n'existe pas
      if (seasons.length === 0) {
        const ref = await db.collection('players').doc(playerId).collection('seasons').add({
          name:'2025/2026', ...DEFAULT_STATS, createdAt: new Date().toISOString()
        });
        seasons = [{id:ref.id, name:'2025/2026', ...DEFAULT_STATS, createdAt: new Date().toISOString()}];
      }

      render();
    }

    function computeTotal() {
      return seasons.reduce((acc, s) => ({
        apps:    (acc.apps    || 0) + (parseInt(s.apps)    || 0),
        goals:   (acc.goals   || 0) + (parseInt(s.goals)   || 0),
        assists: (acc.assists || 0) + (parseInt(s.assists)  || 0),
        avgRating: '—'
      }), {});
    }

    function seasonCard(s, isTotal) {
      const stats = isTotal ? computeTotal() : s;
      const editBtn = !isTotal ? '<button class="btn-edit-season" onclick="editSeason(\'' + s.id + '\')">✏ Modifier</button>' : '';
      const noteCell = !isTotal ? '<div class="stat-cell"><div class="stat-label">Note moy.</div><div class="stat-val">' + (s.avgRating ?? '—') + '</div></div>' : '';
      const highlight = isTotal ? 'highlight' : '';
      const title = isTotal ? '🏆 Total Carrière' : '📅 Saison ' + s.name;
      const transferBadge = (!isTotal && s.transfer) ? `
        <div style="padding:10px 20px;border-bottom:1px solid var(--border);background:rgba(96,170,255,.05);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:.06em;color:#60aaff;">
          ✈ ${s.transfer.type} · ${s.transfer.club}${s.transfer.amount ? ' · ' + s.transfer.amount : ''}
        </div>` : '';
      return `
        <div class="season-card">
          <div class="season-header">
            <span class="season-name ${isTotal?'total':''}">${title}</span>
            ${editBtn}
          </div>
          ${transferBadge}
          <div class="stats-grid">
            <div class="stat-cell">
              <div class="stat-label">Apparitions</div>
              <div class="stat-val ${highlight}">${stats.apps ?? 0}</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">Buts</div>
              <div class="stat-val ${highlight}">${stats.goals ?? 0}</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">Passes déc.</div>
              <div class="stat-val ${highlight}">${stats.assists ?? 0}</div>
            </div>
            ${noteCell}
          </div>
        </div>`;
    }

    function render() {
      document.getElementById('main').innerHTML = `
        <div class="player-banner">
          <div class="banner-pos">${playerData.position||'?'}</div>
          <div>
            <div class="banner-name">${playerData.firstName} <span>${playerData.lastName.toUpperCase()}</span></div>
            <div class="banner-club">⚽ ${playerData.club}</div>
          </div>
        </div>

        <div class="info-msg">
          <span>📊</span>
          Les statistiques sont mises à jour chaque mois, sauf si une performance apparaît dans les actualités.
        </div>

        <div class="actions-bar">
          <button class="btn-add-season" onclick="addSeason()">+ Nouvelle saison (admin)</button>
        </div>

        ${seasons.map(s => seasonCard(s, false)).join('')}
        ${seasons.length > 0 ? seasonCard(null, true) : ''}
      `;
    }

    function editSeason(seasonId) {
      if (!checkAdmin()) return;

      const s = seasons.find(x => x.id === seasonId);
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'stats-modal';
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">✏ Saison ${s.name}</div>
          <div class="modal-field" style="margin-bottom:4px">
            <label>Nom de la saison</label>
            <input type="text" id="m-season-name" value="${s.name}"/>
          </div>
          <div class="modal-grid">
            <div class="modal-field"><label>Apparitions</label><input type="number" id="m-apps" value="${s.apps??0}" min="0"/></div>
            <div class="modal-field"><label>Buts</label><input type="number" id="m-goals" value="${s.goals??0}" min="0"/></div>
            <div class="modal-field"><label>Passes déc.</label><input type="number" id="m-assists" value="${s.assists??0}" min="0"/></div>
            <div class="modal-field"><label>Note moyenne</label><input type="text" id="m-rating" value="${s.avgRating??''}" placeholder="Ex : 7.2"/></div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="deleteSeason('${seasonId}')" style="border-color:#c0392b;color:#c0392b;">✕ Supprimer</button>
            <button class="btn-cancel" onclick="closeModal()">Annuler</button>
            <button class="btn-save" onclick="saveStats('${seasonId}')">✔ Enregistrer</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    async function saveStats(seasonId) {
      const name      = document.getElementById('m-season-name').value.trim() || seasons.find(x=>x.id===seasonId).name;
      const apps      = parseInt(document.getElementById('m-apps').value)    || 0;
      const goals     = parseInt(document.getElementById('m-goals').value)   || 0;
      const assists   = parseInt(document.getElementById('m-assists').value) || 0;
      const avgRating = document.getElementById('m-rating').value.trim() || '—';

      await db.collection('players').doc(playerId).collection('seasons').doc(seasonId).update({ name, apps, goals, assists, avgRating });
      const idx = seasons.findIndex(x => x.id === seasonId);
      seasons[idx] = { ...seasons[idx], name, apps, goals, assists, avgRating };
      closeModal();
      render();
    }

    function addSeason() {
      if (!checkAdmin()) return;

      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'stats-modal';
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">+ Nouvelle saison</div>
          <div class="modal-field">
            <label>Nom de la saison</label>
            <input type="text" id="m-season-name" placeholder="Ex : 2026/2027"/>
          </div>
          <div class="modal-field" style="margin-top:8px">
            <label>Le joueur est-il toujours au même club ?</label>
            <div style="display:flex;gap:10px;margin-top:8px">
              <button class="btn-same-club" id="btn-yes" onclick="selectSameClub(true)"
                style="flex:1;padding:10px;border:1px solid var(--border);border-radius:5px;background:rgba(255,255,255,.03);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s">
                ✔ Même club
              </button>
              <button class="btn-same-club" id="btn-no" onclick="selectSameClub(false)"
                style="flex:1;padding:10px;border:1px solid var(--border);border-radius:5px;background:rgba(255,255,255,.03);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s">
                ✈ Nouveau club
              </button>
            </div>
          </div>
          <div id="transfer-fields" style="display:none;flex-direction:column;gap:12px;margin-top:4px">
            <div class="modal-field">
              <label>Nom du nouveau club</label>
              <input type="text" id="m-new-club" placeholder="Ex : AS Monaco"/>
            </div>
            <div class="modal-field">
              <label>Type de transfert</label>
              <div style="display:flex;gap:8px;margin-top:6px">
                ${['Transfert','Prêt','Libre'].map(t => `
                  <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.02);transition:all .15s" id="tlbl-${t}">
                    <input type="radio" name="transfer-type" value="${t}" onchange="updateTransferType('${t}')" style="display:none"/>
                    ${t}
                  </label>`).join('')}
              </div>
            </div>
            <div class="modal-field" id="amount-field" style="display:none">
              <label>Montant (optionnel)</label>
              <input type="text" id="m-amount" placeholder="Ex : 5M€ ou 500k€"/>
            </div>
          </div>
          <div class="modal-actions" style="margin-top:8px">
            <button class="btn-cancel" onclick="closeModal()">Annuler</button>
            <button class="btn-save" onclick="confirmAddSeason()">✔ Créer</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    let sameClub = true;
    let selectedTransferType = null;

    function selectSameClub(same) {
      sameClub = same;
      const tf = document.getElementById('transfer-fields');
      tf.style.display = same ? 'none' : 'flex';
      document.getElementById('btn-yes').style.borderColor = same ? 'var(--green)' : 'var(--border)';
      document.getElementById('btn-yes').style.color = same ? 'var(--green)' : 'var(--muted)';
      document.getElementById('btn-no').style.borderColor = !same ? 'var(--green)' : 'var(--border)';
      document.getElementById('btn-no').style.color = !same ? 'var(--green)' : 'var(--muted)';
    }

    function updateTransferType(type) {
      selectedTransferType = type;
      ['Transfert','Prêt','Libre'].forEach(t => {
        const lbl = document.getElementById('tlbl-' + t);
        lbl.style.borderColor = t === type ? 'var(--green)' : 'var(--border)';
        lbl.style.color = t === type ? 'var(--green)' : 'var(--muted)';
      });
      document.getElementById('amount-field').style.display = type === 'Transfert' ? 'block' : 'none';
    }

    async function confirmAddSeason() {
      const name = document.getElementById('m-season-name').value.trim();
      if (!name) { alert('Entre un nom de saison.'); return; }

      let newClub = null;
      let transfer = null;

      if (!sameClub) {
        newClub = document.getElementById('m-new-club').value.trim();
        if (!newClub) { alert('Entre le nom du nouveau club.'); return; }
        if (!selectedTransferType) { alert('Sélectionne un type de transfert.'); return; }
        const amount = document.getElementById('m-amount')?.value?.trim() || '';
        transfer = { type: selectedTransferType, amount, club: newClub };
      }

      // Si nouveau club → mettre à jour le club du joueur dans Firebase
      if (newClub) {
        const clubDisplay = selectedTransferType === 'Prêt'
          ? newClub + ' (Prêt)'
          : newClub;
        await db.collection('players').doc(playerId).update({ club: clubDisplay });
        playerData.club = clubDisplay;
      }

      const ref = await db.collection('players').doc(playerId).collection('seasons').add({
        name, ...DEFAULT_STATS, transfer: transfer || null, createdAt: new Date().toISOString()
      });
      seasons.push({ id:ref.id, name, ...DEFAULT_STATS, transfer: transfer || null });
      sameClub = true; selectedTransferType = null;
      closeModal();
      render();
    }

    async function deleteSeason(seasonId) {
      if (!confirm('Supprimer cette saison ? Cette action est irréversible.')) return;
      await db.collection('players').doc(playerId).collection('seasons').doc(seasonId).delete();
      seasons = seasons.filter(x => x.id !== seasonId);
      closeModal();
      render();
    }

    function closeModal() {
      const m = document.getElementById('stats-modal');
      if (m) m.remove();
      sameClub = true; selectedTransferType = null;
    }

    init();
  </script>
</body>
</html>
